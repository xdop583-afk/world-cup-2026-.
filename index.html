<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشجرة كأس العالم 2026 - تحكم يدوي</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --box-bg: #1a1a1a;
            --border-color: #a68940; 
            --text-color: #ffffff;
            --highlight: #285430; 
            --listening: #b89745;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        h1 {
            text-align: center;
            color: var(--border-color);
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        .instructions {
            text-align: center;
            color: #ccc;
            margin-bottom: 30px;
            font-size: 1.1em;
            background-color: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        /* تخطيط المجموعات: يمين ويسار */
        .top-layout {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
        }

        .groups-side {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 48%;
        }

        .group-box {
            background-color: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            overflow: hidden;
            font-size: 0.85em;
        }

        .group-header {
            background-color: var(--border-color);
            color: #000;
            text-align: center;
            font-weight: bold;
            padding: 5px;
        }

        .group-team {
            padding: 6px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        .group-team:last-child { border-bottom: none; }
        .group-team:hover { background-color: #333; color: var(--border-color); }
        .group-team.used { opacity: 0.5; }

        /* تصميم المشجرة */
        .bracket-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            min-width: 1200px;
            gap: 20px;
        }

        .bracket-half {
            display: flex;
            flex-direction: row;
            width: 40%;
            justify-content: space-between;
        }

        .bracket-half.reverse {
            flex-direction: row-reverse;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 22%;
        }

        .match {
            background-color: var(--box-bg);
            border: 1px solid #444;
            border-radius: 4px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
        }

        .team-slot {
            padding: 8px 5px;
            font-size: 0.85em;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: 20px;
        }
        .team-slot:last-child { border-bottom: none; }
        
        .team-slot:hover:not(.listening) {
            background-color: #333;
        }

        .team-slot.selected {
            background-color: var(--highlight);
            border-color: var(--border-color);
            font-weight: bold;
        }

        /* تأثير الخانة عند انتظار اختيار المنتخب من المجموعة */
        .team-slot.listening {
            border: 2px dashed var(--listening);
            background-color: #2a2a2a;
            color: var(--listening);
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(166, 137, 64, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(166, 137, 64, 0); }
            100% { box-shadow: 0 0 0 0 rgba(166, 137, 64, 0); }
        }

        /* قسم النهائي في المنتصف */
        .center-finals {
            width: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .trophy {
            width: 120px;
            height: 250px;
            background: url('https://upload.wikimedia.org/wikipedia/en/thumb/e/e3/2026_FIFA_World_Cup_logo.svg/1200px-2026_FIFA_World_Cup_logo.svg.png') no-repeat center center;
            background-size: contain;
            margin: 20px 0;
        }

        .final-match {
            width: 100%;
            background-color: var(--box-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
        }

        .final-title {
            color: var(--border-color);
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
