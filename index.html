<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مشجرة كأس العالم 2026 - تحكم يدوي</title>
    <style>
        :root {
            --bg-color: #0d0d0d;
            --box-bg: #1a1a1a;
            --border-color: #a68940; 
            --text-color: #ffffff;
            --highlight: #285430; 
            --listening: #b89745;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            overflow-x: auto;
        }

        h1 {
            text-align: center;
            color: var(--border-color);
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        .instructions {
            text-align: center;
            color: #ccc;
            margin-bottom: 30px;
            font-size: 1.1em;
            background-color: #222;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        /* تخطيط المجموعات: يمين ويسار */
        .top-layout {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 40px;
        }

        .groups-side {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 48%;
        }

        .group-box {
            background-color: var(--box-bg);
            border: 1px solid var(--border-color);
            border-radius: 5px;
            overflow: hidden;
            font-size: 0.85em;
        }

        .group-header {
            background-color: var(--border-color);
            color: #000;
            text-align: center;
            font-weight: bold;
            padding: 5px;
        }

        .group-team {
            padding: 6px;
            border-bottom: 1px solid #333;
            cursor: pointer;
            transition: all 0.2s;
        }
        .group-team:last-child { border-bottom: none; }
        .group-team:hover { background-color: #333; color: var(--border-color); }
        .group-team.used { opacity: 0.5; }

        /* تصميم المشجرة */
        .bracket-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: stretch;
            min-width: 1200px;
            gap: 20px;
        }

        .bracket-half {
            display: flex;
            flex-direction: row;
            width: 40%;
            justify-content: space-between;
        }

        .bracket-half.reverse {
            flex-direction: row-reverse;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 22%;
        }

        .match {
            background-color: var(--box-bg);
            border: 1px solid #444;
            border-radius: 4px;
            margin: 10px 0;
            display: flex;
            flex-direction: column;
        }

        .team-slot {
            padding: 8px 5px;
            font-size: 0.85em;
            cursor: pointer;
            border-bottom: 1px solid #333;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            min-height: 20px;
        }
        .team-slot:last-child { border-bottom: none; }
        
        .team-slot:hover:not(.listening) {
            background-color: #333;
        }

        .team-slot.selected {
            background-color: var(--highlight);
            border-color: var(--border-color);
            font-weight: bold;
        }

        /* تأثير الخانة عند انتظار اختيار المنتخب من المجموعة */
        .team-slot.listening {
            border: 2px dashed var(--listening);
            background-color: #2a2a2a;
            color: var(--listening);
            font-weight: bold;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(166, 137, 64, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(166, 137, 64, 0); }
            100% { box-shadow: 0 0 0 0 rgba(166, 137, 64, 0); }
        }

        /* قسم النهائي في المنتصف */
        .center-finals {
            width: 15%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .trophy {
            width: 120px;
            height: 250px;
            background: url('https://upload.wikimedia.org/wikipedia/en/thumb/e/e3/2026_FIFA_World_Cup_logo.svg/1200px-2026_FIFA_World_Cup_logo.svg.png') no-repeat center center;
            background-size: contain;
            margin: 20px 0;
        }

        .final-match {
            width: 100%;
            background-color: var(--box-bg);
            border: 2px solid var(--border-color);
            border-radius: 8px;
        }

        .final-title {
            color: var(--border-color);
            font-weight: bold;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h1>مشجرة كأس العالم 2026</h1>
    <div class="instructions">
        <strong>طريقة التأهيل:</strong> اضغط على أي خانة فارغة في "دور الـ 32" لتحديدها، ثم اضغط على المنتخب من المجموعات ليتم وضعه فيها.
    </div>

    <div class="top-layout">
        <div class="groups-side" id="groups-right"></div> <div class="groups-side" id="groups-left" style="direction: ltr; text-align: right;"></div> </div>

    <div class="bracket-wrapper">
        <div class="bracket-half" id="right-bracket"></div>

        <div class="center-finals">
            <div class="final-title">النهائي</div>
            <div class="match final-match" id="final-match">
                <div class="team-slot" onclick="advanceTeam(this, 'champion', 4)" data-target="champion" data-slot="0">---</div>
                <div class="team-slot" onclick="advanceTeam(this, 'champion', 4)" data-target="champion" data-slot="1">---</div>
            </div>
            <div class="trophy"></div>
            <div class="final-title">البطل</div>
            <div class="match final-match">
                <div class="team-slot" id="champion" style="text-align:center; color:#a68940; font-weight:bold; font-size:1.2em; justify-content:center;">؟؟؟</div>
            </div>
        </div>

        <div class="bracket-half reverse" id="left-bracket"></div>
    </div>

<script>
    // المنتخبات الرسمية المؤكدة لمجموعات كأس العالم 2026
    const groupsData = [
        { name: "A", teams: ["🇲🇽 المكسيك", "🇿🇦 جنوب إفريقيا", "🇰🇷 كوريا الجنوبية", "🇨🇿 التشيك"] },
        { name: "B", teams: ["🇨🇦 كندا", "🇧🇦 البوسنة والهرسك", "🇶🇦 قطر", "🇨🇭 سويسرا"] },
        { name: "C", teams: ["🇧🇷 البرازيل", "🇲🇦 المغرب", "🇭🇹 هايتي", "🏴󠁧󠁢󠁳󠁣󠁴󠁿 اسكتلندا"] },
        { name: "D", teams: ["🇺🇸 أمريكا", "🇵🇾 باراغواي", "🇦🇺 أستراليا", "🇹🇷 تركيا"] },
        { name: "E", teams: ["🇩🇪 ألمانيا", "🇨🇼 كوراساو", "🇨🇮 ساحل العاج", "🇪🇨 الإكوادور"] },
        { name: "F", teams: ["🇳🇱 هولندا", "🇯🇵 اليابان", "🇸🇪 السويد", "🇹🇳 تونس"] },
        { name: "G", teams: ["🇧🇪 بلجيكا", "🇪🇬 مصر", "🇮🇷 إيران", "🇳🇿 نيوزيلندا"] },
        { name: "H", teams: ["🇪🇸 إسبانيا", "🇨🇻 الرأس الأخضر", "🇸🇦 السعودية", "🇺🇾 أوروغواي"] },
        { name: "I", teams: ["🇫🇷 فرنسا", "🇸🇳 السنغال", "🇮🇶 العراق", "🇳🇴 النرويج"] },
        { name: "J", teams: ["🇦🇷 الأرجنتين", "🇩🇿 الجزائر", "🇦🇹 النمسا", "🇯🇴 الأردن"] },
        { name: "K", teams: ["🇵🇹 البرتغال", "🇨🇩 الكونغو الديمقراطية", "🇺🇿 أوزبكستان", "🇨🇴 كولومبيا"] },
        { name: "L", teams: ["🏴󠁧󠁢󠁥󠁮󠁧󠁿 إنجلترا", "🇭🇷 كرواتيا", "🇬🇭 غانا", "🇵🇦 بنما"] }
    ];

    // تقسيم المجموعات يمين ويسار
    const rightGroups = groupsData.slice(0, 6);
    const leftGroups = groupsData.slice(6, 12);

    function renderGroups(groups, containerId) {
        const container = document.getElementById(containerId);
        groups.forEach(group => {
            let html = `<div class="group-box"><div class="group-header" style="direction: rtl;">المجموعة ${group.name}</div>`;
            group.teams.forEach(team => {
                // إضافة دالة النقر لاختيار المنتخب
                html += `<div class="group-team" onclick="handleGroupTeamClick(this)" style="direction: rtl;">${team}</div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
    }

    renderGroups(rightGroups, 'groups-right');
    renderGroups(leftGroups, 'groups-left');

    const roundsMap = [8, 4, 2, 1]; // دور 32، 16، ربع نهائي، نصف نهائي

    function buildBracketSide(containerId, prefix) {
        const container = document.getElementById(containerId);
        
        roundsMap.forEach((matchCount, roundIndex) => {
            let roundDiv = document.createElement('div');
            roundDiv.className = 'round';

            for (let i = 0; i < matchCount; i++) {
                let targetMatchId = '';
                let targetSlot = i % 2; 

                if (roundIndex < roundsMap.length - 1) {
                    let nextMatchIndex = Math.floor(i / 2);
                    targetMatchId = `${prefix}-r${roundIndex + 1}-m${nextMatchIndex}`;
                } else {
                    targetMatchId = 'final-match'; 
                    targetSlot = prefix === 'right' ? 0 : 1;
                }

                let matchId = `${prefix}-r${roundIndex}-m${i}`;
                
                // الخانات المبدئية لدور الـ 32 ستكون فارغة في البداية لتملأها يدوياً
                let defaultText = roundIndex === 0 ? `---` : `---`;

                roundDiv.innerHTML += `
                    <div class="match" id="${matchId}">
                        <div class="team-slot" onclick="advanceTeam(this, '${targetMatchId}', ${roundIndex})" data-target="${targetMatchId}" data-slot="${targetSlot}" data-current-slot="0">${defaultText}</div>
                        <div class="team-slot" onclick="advanceTeam(this, '${targetMatchId}', ${roundIndex})" data-target="${targetMatchId}" data-slot="${targetSlot}" data-current-slot="1">${defaultText}</div>
                    </div>
                `;
            }
            container.appendChild(roundDiv);
        });
    }

    buildBracketSide('right-bracket', 'right');
    buildBracketSide('left-bracket', 'left');

    // متغير لتخزين الخانة المحددة في دور الـ 32 لاستقبال المنتخب
    let activeR32Slot = null;

    window.advanceTeam = function(element, targetId, roundIndex) {
        // إذا كانت الخانة في دور الـ 32 (الأساس)
        if (roundIndex === 0) {
            if (activeR32Slot) activeR32Slot.classList.remove('listening');
            
            // إذا تم النقر على الخانة وهي مفعلة بالفعل، يتم إلغاء التفعيل والمسح
            if (activeR32Slot === element) {
                activeR32Slot = null;
                element.innerText = '---';
                clearForward(element);
                return;
            }

            // تفعيل الخانة لتستقبل المنتخب
            activeR32Slot = element;
            element.classList.add('listening');
            element.innerText = '[اختر من المجموعات]';
            clearForward(element);
            return;
        }

        // --- نظام النقر للأدوار المتقدمة (دور 16 وما بعده) ---
        const teamName = element.innerText;
        if (teamName === '---' || teamName === '[اختر من المجموعات]' || teamName === '؟؟؟') return;

        const isAlreadySelected = element.classList.contains('selected');
        const targetSlotIndex = element.getAttribute('data-slot');
        let targetElement = null;

        if (targetId === 'champion') {
            targetElement = document.getElementById('champion');
        } else {
            const targetMatch = document.getElementById(targetId);
            if(targetMatch) {
                targetElement = targetMatch.querySelectorAll('.team-slot')[targetSlotIndex];
            }
        }

        if (isAlreadySelected) {
            // إلغاء التأهيل
            element.classList.remove('selected');
            if (targetElement) {
                targetElement.innerText = '---';
                targetElement.classList.remove('selected');
                clearForward(targetElement);
            }
        } else {
            // تأهيل المنتخب وإلغاء الخصم
            const siblings = element.parentElement.querySelectorAll('.team-slot');
            siblings.forEach(sib => {
                sib.classList.remove('selected');
                const sibTargetId = sib.getAttribute('data-target');
                if (sibTargetId && sibTargetId !== 'champion') {
                    const sibTargetMatch = document.getElementById(sibTargetId);
                    if(sibTargetMatch) {
                        const sibTargetEl = sibTargetMatch.querySelectorAll('.team-slot')[sib.getAttribute('data-slot')];
                        if(sibTargetEl.innerText === sib.innerText) {
                            sibTargetEl.innerText = '---';
                            sibTargetEl.classList.remove('selected');
                            clearForward(sibTargetEl);
                        }
                    }
                }
            });

            element.classList.add('selected');
            if (targetElement) {
                targetElement.innerText = teamName;
                targetElement.classList.remove('selected'); 
                
                if(targetId === 'champion') {
                    targetElement.style.color = "#ffd700";
                }
            }
        }
    };

    // دالة وضع المنتخب من المجموعة إلى الخانة المحددة في دور الـ 32
    window.handleGroupTeamClick = function(element) {
        if (activeR32Slot) {
            activeR32Slot.innerText = element.innerText;
            activeR32Slot.classList.remove('listening');
            element.classList.add('used'); // إضافة تأثير بصري خفيف للمنتخب المستخدم
            activeR32Slot = null;
        } else {
            alert('يرجى النقر على إحدى خانات دور الـ 32 أولاً لتحديد المكان، ثم النقر على المنتخب لنقله إليها.');
        }
    };

    // دالة مسح اسم الفريق من الأدوار المتقدمة إذا تم التراجع عنه
    function clearForward(element) {
        let currentEl = element;
        while(currentEl) {
            let nextId = currentEl.getAttribute('data-target');
            if(!nextId) break;
            
            if(nextId === 'champion') {
                const champ = document.getElementById('champion');
                if(champ.innerText === currentEl.innerText) {
                    champ.innerText = '؟؟؟';
                    champ.style.color = "var(--border-color)";
                }
                break;
            }

            const nextMatch = document.getElementById(nextId);
            if(nextMatch) {
                const nextSlotIndex = currentEl.getAttribute('data-slot');
                const nextEl = nextMatch.querySelectorAll('.team-slot')[nextSlotIndex];
                if(nextEl.innerText === currentEl.innerText) {
                    nextEl.innerText = '---';
                    nextEl.classList.remove('selected');
                    currentEl = nextEl;
                } else {
                    break;
                }
            } else {
                break;
            }
        }
    }
</script>

</body>
</html>
